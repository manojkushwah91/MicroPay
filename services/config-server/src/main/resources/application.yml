jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:your-secret-password}
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator

server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      enabled: true
      server:
        native:
          search-locations: file:./config-repo,file:../config-repo,classpath:/config-repo

management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: MicroPay Config Server
    description: Centralized configuration server for MicroPay microservices
    version: 1.0.0

logging:
  level:
    root: INFO
    org.springframework.cloud.config: DEBUG
    com.micropay: DEBUG