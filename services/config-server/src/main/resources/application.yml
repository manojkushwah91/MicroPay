jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:your-secret-password}
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator

server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      enabled: false 
      server:
        native:
          # Points to the folder in the MicroPay root
          search-locations: file:./config-repo,file:../config-repo,classpath:/config-repo

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: MicroPay Config Server
    description: Centralized configuration server for MicroPay microservices
    version: 1.0.0

logging:
  level:
    root: INFO
    org.springframework.cloud.config: DEBUG
    com.micropay: DEBUG