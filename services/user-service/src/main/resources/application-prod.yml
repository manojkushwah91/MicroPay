spring:
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

  datasource:
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

eureka:
  client:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO

  pattern:
    console: '{"ts":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%p","service":"${spring.application.name:-user-service}","logger":"%c{1}","thread":"%t","msg":"%m"}%n'