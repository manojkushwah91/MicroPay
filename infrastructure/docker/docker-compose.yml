name: micropay

services:
  # ============================================
  # Infrastructure Services
  # ============================================
  
  postgres:
    image: postgres:16-alpine
    container_name: micropay-postgres
    hostname: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: micropay-redis
    hostname: redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: micropay-zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx128m"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: micropay-kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${KAFKA_ADVERTISED_HOST:-127.0.0.1}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "127.0.0.1:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: micropay-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - micropay-network
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      echo 'Creating Kafka topics (idempotent)...';
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic user.created --partitions 3 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic wallet.balance.updated --partitions 3 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic payment.initiated --partitions 3 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic payment.authorized --partitions 3 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic payment.completed --partitions 3 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic payment.failed --partitions 3 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic transaction.recorded --partitions 3 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic notification.send --partitions 3 --replication-factor 1;
      echo 'Kafka topics ready.';
      "
    restart: "no"
    profiles: ["kafka-init"]

  # ============================================
  # Spring Cloud Base Services
  # ============================================

  config-server:
    image: micropay-config-server:local
    build:
      context: ../../services/config-server
      dockerfile: Dockerfile
    container_name: micropay-config-server
    hostname: config-server
    environment:
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:/config-repo
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-admin}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-micropay_secure}
    volumes:
      - ../../config-repo:/config-repo
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD-SHELL", "curl -u ${CONFIG_SERVER_USER:-admin}:${CONFIG_SERVER_PASSWORD:-micropay_secure} -fsS http://127.0.0.1:8888/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  eureka-server:
    image: micropay-eureka-server:local
    build:
      context: ../../services/eureka-server
      dockerfile: Dockerfile
    container_name: micropay-eureka-server
    hostname: eureka-server
    environment:
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-admin}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-micropay_secure}
      SPRING_CONFIG_IMPORT: optional:configserver:http://${CONFIG_SERVER_USER:-admin}:${CONFIG_SERVER_PASSWORD:-micropay_secure}@config-server:8888
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - micropay-network
    ports:              
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8761/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ============================================
  # Microservices
  # ============================================

  api-gateway:
    image: micropay-api-gateway:local
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    container_name: micropay-api-gateway
    hostname: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms128m -Xmx384m"
      FRONTEND_URL: ${FRONTEND_URL:-http://127.0.0.1}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-admin}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-micropay_secure}
      SPRING_CONFIG_IMPORT: optional:configserver:http://${CONFIG_SERVER_USER:-admin}:${CONFIG_SERVER_PASSWORD:-micropay_secure}@config-server:8888
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_ENCRYPTOR_PASSWORD:?JASYPT_ENCRYPTOR_PASSWORD is required}
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      config-server:
        condition: service_healthy
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  auth-service:
    image: micropay-auth-service:local
    build:
      context: ../../services
      dockerfile: auth-service/Dockerfile
    container_name: micropay-auth-service
    hostname: auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms128m -Xmx256m"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      AUTH_DB_URL: ${AUTH_DB_URL:-jdbc:postgresql://postgres:5432/micropay_auth_db}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-admin}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-micropay_secure}
      SPRING_CONFIG_IMPORT: optional:configserver:http://${CONFIG_SERVER_USER:-admin}:${CONFIG_SERVER_PASSWORD:-micropay_secure}@config-server:8888
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_ENCRYPTOR_PASSWORD:?JASYPT_ENCRYPTOR_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  user-service:
    image: micropay-user-service:local
    build:
      context: ../../services
      dockerfile: user-service/Dockerfile
    container_name: micropay-user-service
    hostname: user-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms128m -Xmx256m"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      USER_DB_URL: ${USER_DB_URL:-jdbc:postgresql://postgres:5432/micropay_user_db}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-admin}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-micropay_secure}
      SPRING_CONFIG_IMPORT: optional:configserver:http://${CONFIG_SERVER_USER:-admin}:${CONFIG_SERVER_PASSWORD:-micropay_secure}@config-server:8888
      SERVER_PORT: "8082"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_ENCRYPTOR_PASSWORD:?JASYPT_ENCRYPTOR_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  wallet-service:
    image: micropay-wallet-service:local
    build:
      context: ../../services
      dockerfile: wallet-service/Dockerfile
    container_name: micropay-wallet-service
    hostname: wallet-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms128m -Xmx256m"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      WALLET_DB_URL: ${WALLET_DB_URL:-jdbc:postgresql://postgres:5432/micropay_wallet_db}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-admin}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-micropay_secure}
      SPRING_CONFIG_IMPORT: optional:configserver:http://${CONFIG_SERVER_USER:-admin}:${CONFIG_SERVER_PASSWORD:-micropay_secure}@config-server:8888
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_ENCRYPTOR_PASSWORD:?JASYPT_ENCRYPTOR_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8083/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  payment-service:
    image: micropay-payment-service:local
    build:
      context: ../../services
      dockerfile: payment-service/Dockerfile
    container_name: micropay-payment-service
    hostname: payment-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms128m -Xmx256m"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PAYMENT_DB_URL: ${PAYMENT_DB_URL:-jdbc:postgresql://postgres:5432/micropay_payment_db}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-admin}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-micropay_secure}
      SPRING_CONFIG_IMPORT: optional:configserver:http://${CONFIG_SERVER_USER:-admin}:${CONFIG_SERVER_PASSWORD:-micropay_secure}@config-server:8888
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_ENCRYPTOR_PASSWORD:?JASYPT_ENCRYPTOR_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8084/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  transaction-service:
    image: micropay-transaction-service:local
    build:
      context: ../../services
      dockerfile: transaction-service/Dockerfile
    container_name: micropay-transaction-service
    hostname: transaction-service
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms128m -Xmx256m"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TRANSACTION_DB_URL: ${TRANSACTION_DB_URL:-jdbc:postgresql://postgres:5432/micropay_transaction_db}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-admin}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-micropay_secure}
      SPRING_CONFIG_IMPORT: optional:configserver:http://${CONFIG_SERVER_USER:-admin}:${CONFIG_SERVER_PASSWORD:-micropay_secure}@config-server:8888
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_ENCRYPTOR_PASSWORD:?JASYPT_ENCRYPTOR_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8085/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  notification-service:
    image: micropay-notification-service:local
    build:
      context: ../../services
      dockerfile: notification-service/Dockerfile
    container_name: micropay-notification-service
    hostname: notification-service
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms128m -Xmx256m"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      NOTIFICATION_DB_URL: ${NOTIFICATION_DB_URL:-jdbc:postgresql://postgres:5432/micropay_notification_db}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-admin}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-micropay_secure}
      SPRING_CONFIG_IMPORT: optional:configserver:http://${CONFIG_SERVER_USER:-admin}:${CONFIG_SERVER_PASSWORD:-micropay_secure}@config-server:8888
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_ENCRYPTOR_PASSWORD:?JASYPT_ENCRYPTOR_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8086/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # ============================================
  # Frontend & Reverse Proxy
  # ============================================

  frontend:
    image: micropay-frontend:local
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: micropay-frontend
    hostname: frontend
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s 
    restart: unless-stopped
    profiles: ["frontend"]

  nginx:
    image: nginx:1.27-alpine
    container_name: micropay-nginx
    hostname: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      api-gateway:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    profiles: ["frontend"]

  # ============================================
  # Monitoring Services
  # ============================================
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: micropay-zipkin
    networks:
      - micropay-network
    restart: unless-stopped
    profiles: ["monitoring"]

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: micropay-kafka-ui
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: micropay
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - micropay-network
    depends_on:
      kafka:
        condition: service_healthy
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:11.1.0
    container_name: micropay-grafana
    hostname: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SERVER_ROOT_URL=http://localhost:3001/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - micropay-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    profiles: ["monitoring"]

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: micropay-prometheus
    hostname: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - micropay-network
    restart: unless-stopped
    profiles: ["monitoring"]

# ============================================
# Networks
# ============================================

networks:
  micropay-network:
    driver: bridge
    name: micropay-network

# ============================================
# Volumes
# ============================================

volumes:
  postgres-data:
    name: micropay-postgres-data
  zookeeper-data:
    name: micropay-zookeeper-data-v2
  kafka-data:
    name: micropay-kafka-data-v2
  redis-data:
    name: micropay-redis-data
  grafana-data:
    name: micropay-grafana-data
  prometheus-data:
    name: micropay-prometheus-data