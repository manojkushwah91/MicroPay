server {
    listen 80;
    server_name _;

    # Docker's internal DNS server (standard for all Compose setups)
    resolver 127.0.0.11 valid=30s;

    # Health check for Nginx/Docker
    location /health {
        access_log off;
        return 200 "healthy\n";
    }

    # API Gateway Routing
    location /api/ {
        # Using a variable forces Nginx to resolve the name at RUNTIME, not startup
        set $gateway_url http://api-gateway:8080;
        proxy_pass $gateway_url; 
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # Frontend Routing
    location / {
        set $frontend_url http://frontend:80;
        proxy_pass $frontend_url;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}