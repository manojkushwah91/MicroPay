name: MicroPay CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw -B test

  build-and-push:
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend images
        run: |
          docker build -t $ECR_REGISTRY/micropay-api-gateway:$IMAGE_TAG services/api-gateway
          docker build -f services/auth-service/Dockerfile -t $ECR_REGISTRY/micropay-auth-service:$IMAGE_TAG services
          docker build -f services/user-service/Dockerfile -t $ECR_REGISTRY/micropay-user-service:$IMAGE_TAG services
          docker build -f services/wallet-service/Dockerfile -t $ECR_REGISTRY/micropay-wallet-service:$IMAGE_TAG services
          docker build -f services/payment-service/Dockerfile -t $ECR_REGISTRY/micropay-payment-service:$IMAGE_TAG services
          docker build -f services/transaction-service/Dockerfile -t $ECR_REGISTRY/micropay-transaction-service:$IMAGE_TAG services
          docker build -f services/notification-service/Dockerfile -t $ECR_REGISTRY/micropay-notification-service:$IMAGE_TAG services
          docker build -t $ECR_REGISTRY/micropay-eureka-server:$IMAGE_TAG services/eureka-server
          docker build -t $ECR_REGISTRY/micropay-config-server:$IMAGE_TAG services/config-server

          docker push $ECR_REGISTRY/micropay-api-gateway:$IMAGE_TAG
          docker push $ECR_REGISTRY/micropay-auth-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/micropay-user-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/micropay-wallet-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/micropay-payment-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/micropay-transaction-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/micropay-notification-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/micropay-eureka-server:$IMAGE_TAG
          docker push $ECR_REGISTRY/micropay-config-server:$IMAGE_TAG

      - name: Build and push frontend image
        run: |
          docker build --build-arg VITE_API_BASE_URL=/api -t $ECR_REGISTRY/micropay-frontend:$IMAGE_TAG frontend
          docker push $ECR_REGISTRY/micropay-frontend:$IMAGE_TAG

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SSH and deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e
            sudo mkdir -p /opt/micropay
            sudo chown $USER:$USER /opt/micropay
            cd /opt/micropay

            # Sync repo (optional: you can template only docker dir)
            if [ ! -d .git ]; then
              git init
              git remote add origin ${{ github.repositoryUrl }}
            fi
            git fetch origin
            git reset --hard origin/main

            export ECR_REGISTRY=${{ env.ECR_REGISTRY }}
            export IMAGE_TAG=${{ env.IMAGE_TAG }}

            cd infrastructure/docker
            docker compose -f docker-compose.prod.yml --env-file ../../.env pull || true
            docker compose -f docker-compose.prod.yml --env-file ../../.env up -d

name: Deploy MicroPay (AWS Free Tier)

on:
  push:
    branches: ["main"]

concurrency:
  group: micropay-prod
  cancel-in-progress: true

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image variables
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_ENV

      - name: Build and push backend images
        run: |
          set -euo pipefail
          docker build -t "$ECR_REGISTRY/micropay-api-gateway:$IMAGE_TAG" services/api-gateway
          docker build -f services/auth-service/Dockerfile -t "$ECR_REGISTRY/micropay-auth-service:$IMAGE_TAG" services
          docker build -f services/user-service/Dockerfile -t "$ECR_REGISTRY/micropay-user-service:$IMAGE_TAG" services
          docker build -f services/wallet-service/Dockerfile -t "$ECR_REGISTRY/micropay-wallet-service:$IMAGE_TAG" services
          docker build -f services/payment-service/Dockerfile -t "$ECR_REGISTRY/micropay-payment-service:$IMAGE_TAG" services
          docker build -f services/transaction-service/Dockerfile -t "$ECR_REGISTRY/micropay-transaction-service:$IMAGE_TAG" services
          docker build -f services/notification-service/Dockerfile -t "$ECR_REGISTRY/micropay-notification-service:$IMAGE_TAG" services
          docker build -t "$ECR_REGISTRY/micropay-eureka-server:$IMAGE_TAG" services/eureka-server
          docker build -t "$ECR_REGISTRY/micropay-config-server:$IMAGE_TAG" services/config-server

          docker push "$ECR_REGISTRY/micropay-api-gateway:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/micropay-auth-service:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/micropay-user-service:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/micropay-wallet-service:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/micropay-payment-service:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/micropay-transaction-service:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/micropay-notification-service:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/micropay-eureka-server:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/micropay-config-server:$IMAGE_TAG"

      - name: Build and push frontend image (for EC2 nginx)
        run: |
          set -euo pipefail
          docker build -t "$ECR_REGISTRY/micropay-frontend:$IMAGE_TAG" frontend
          docker push "$ECR_REGISTRY/micropay-frontend:$IMAGE_TAG"

      - name: Upload compose bundle to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

          ssh "$EC2_USER@$EC2_HOST" "sudo mkdir -p /opt/micropay && sudo chown -R $EC2_USER:$EC2_USER /opt/micropay"
          scp infrastructure/docker/docker-compose.prod.yml "$EC2_USER@$EC2_HOST:/opt/micropay/docker-compose.prod.yml"
          scp -r infrastructure/docker/postgres-init "$EC2_USER@$EC2_HOST:/opt/micropay/postgres-init"
          scp -r infrastructure/docker/nginx "$EC2_USER@$EC2_HOST:/opt/micropay/nginx"

      - name: Deploy on EC2 (docker compose)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

          umask 077
          cat > .env.deploy <<EOF
SPRING_PROFILES_ACTIVE=prod
JAVA_OPTS=-Xms128m -Xmx256m

ECR_REGISTRY=$ECR_REGISTRY
IMAGE_TAG=$IMAGE_TAG

POSTGRES_USER=postgres
POSTGRES_PASSWORD=$POSTGRES_PASSWORD

JWT_SECRET=$JWT_SECRET
JWT_EXPIRATION=86400000

AUTH_DB_URL=jdbc:postgresql://postgres:5432/micropay_auth_db
WALLET_DB_URL=jdbc:postgresql://postgres:5432/micropay_wallet_db
PAYMENT_DB_URL=jdbc:postgresql://postgres:5432/micropay_payment_db
TRANSACTION_DB_URL=jdbc:postgresql://postgres:5432/micropay_transaction_db
NOTIFICATION_DB_URL=jdbc:postgresql://postgres:5432/micropay_notification_db

KAFKA_BROKER=kafka:29092
KAFKA_ADVERTISED_HOST=$EC2_HOST

VITE_API_BASE_URL=/api
FRONTEND_URL=http://$EC2_HOST
EOF

          scp .env.deploy "$EC2_USER@$EC2_HOST:/opt/micropay/.env"
          rm -f .env.deploy

          ssh "$EC2_USER@$EC2_HOST" "set -euo pipefail
            cd /opt/micropay
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
          "

  deploy-frontend-s3:
    runs-on: ubuntu-latest
    needs: [build-push-deploy]
    permissions:
      contents: read
    if: ${{ secrets.FRONTEND_S3_BUCKET != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          VITE_API_BASE_URL="${{ secrets.FRONTEND_API_BASE_URL }}" npm run build

      - name: Upload to S3
        run: |
          aws s3 sync frontend/dist "s3://${{ secrets.FRONTEND_S3_BUCKET }}" --delete

      - name: Invalidate CloudFront (optional)
        if: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"

