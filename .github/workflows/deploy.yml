name: MicroPay CI/CD

# =========================
# 🔁 TRIGGERS
# =========================
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# =========================
# 🚦 CONCURRENCY CONTROL
# =========================
concurrency:
  group: micropay-prod
  cancel-in-progress: true

# =========================
# 🌍 GLOBAL ENV VARIABLES
# =========================
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

# =========================
# 🧪 JOB 1: TEST & BUILD
# =========================
jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ⚡ Cache dependencies
      - name: Cache Maven repo
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      # 🧪 Run tests
      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw -B test

# =========================
# 🐳 JOB 2: BUILD & PUSH DOCKER IMAGES
# =========================
  build-and-push:
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      # 📥 Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Configure AWS
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔑 Login to ECR
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 🏷️ Use short commit SHA
      - name: Set short SHA
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 🐳 Build & Push Backend Services
      - name: Build & Push Backend Images
        run: |
          set -e

          SERVICES=(
            api-gateway
            auth-service
            user-service
            wallet-service
            payment-service
            transaction-service
            notification-service
            eureka-server
            config-server
          )

          for SERVICE in "${SERVICES[@]}"; do
            echo "🚀 Building $SERVICE..."

            if [[ "$SERVICE" == "api-gateway" || "$SERVICE" == "eureka-server" || "$SERVICE" == "config-server" ]]; then
              docker build -t $ECR_REGISTRY/micropay-$SERVICE:$IMAGE_TAG services/$SERVICE
            else
              docker build -f services/$SERVICE/Dockerfile -t $ECR_REGISTRY/micropay-$SERVICE:$IMAGE_TAG services
            fi

            echo "📤 Pushing $SERVICE..."
            docker push $ECR_REGISTRY/micropay-$SERVICE:$IMAGE_TAG
          done

      # 🌐 Build & Push Frontend
      - name: Build & Push Frontend
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=/api \
            -t $ECR_REGISTRY/micropay-frontend:$IMAGE_TAG frontend

          docker push $ECR_REGISTRY/micropay-frontend:$IMAGE_TAG

# =========================
# 🚀 JOB 3: DEPLOY TO EC2
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # 🔐 Configure AWS
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔑 Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      # 📂 Upload required files
      - name: Upload files to EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo mkdir -p /opt/micropay && sudo chown -R $USER:$USER /opt/micropay"

          scp infrastructure/docker/docker-compose.prod.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/micropay/

          scp -r infrastructure/docker/postgres-init \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/micropay/

          scp -r infrastructure/docker/nginx \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/micropay/

      # ⚙️ Deploy application
      - name: Deploy on EC2
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          # Create env file
          cat > .env <<EOF
ECR_REGISTRY=$ECR_REGISTRY
IMAGE_TAG=$IMAGE_TAG
SPRING_PROFILES_ACTIVE=prod
POSTGRES_USER=postgres
POSTGRES_PASSWORD=$POSTGRES_PASSWORD
JWT_SECRET=$JWT_SECRET
JWT_EXPIRATION=86400000
VITE_API_BASE_URL=/api
FRONTEND_URL=http://${{ secrets.EC2_HOST }}
EOF

          # Upload env
          scp .env ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/micropay/.env

          # Run deployment
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $ECR_REGISTRY

            cd /opt/micropay
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
          "

# =========================
# ☁️ JOB 4: FRONTEND S3 DEPLOY (OPTIONAL)
# =========================
  deploy-frontend-s3:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ secrets.FRONTEND_S3_BUCKET != '' }}

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Configure AWS
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 🏗️ Build frontend
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          VITE_API_BASE_URL=${{ secrets.FRONTEND_API_BASE_URL }} npm run build

      # 📤 Upload to S3
      - name: Upload to S3
        run: |
          aws s3 sync frontend/dist s3://${{ secrets.FRONTEND_S3_BUCKET }} --delete

      # 🔄 CloudFront cache clear
      - name: Invalidate CloudFront
        if: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"